version: '3.8'

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - novapay-network
  environment: &common-env
    REDIS_URL: redis://redis:6379
    MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2}
    LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  # --- Infrastructure ---
  postgres-account:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: novapay_account
      POSTGRES_USER: novapay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novapay_secret}
    volumes:
      - pg-account-data:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    networks:
      - novapay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novapay -d novapay_account"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-transaction:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: novapay_transaction
      POSTGRES_USER: novapay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novapay_secret}
    volumes:
      - pg-transaction-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - novapay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novapay -d novapay_transaction"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-ledger:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: novapay_ledger
      POSTGRES_USER: novapay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novapay_secret}
    volumes:
      - pg-ledger-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - novapay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novapay -d novapay_ledger"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-fx:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: novapay_fx
      POSTGRES_USER: novapay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novapay_secret}
    volumes:
      - pg-fx-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - novapay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novapay -d novapay_fx"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-payroll:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: novapay_payroll
      POSTGRES_USER: novapay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novapay_secret}
    volumes:
      - pg-payroll-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - novapay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novapay -d novapay_payroll"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - novapay-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Application Services ---
  gateway:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      <<: *common-env
      PORT: 3000
      ACCOUNT_SERVICE_URL: http://account-service:3001
      TRANSACTION_SERVICE_URL: http://transaction-service:3002
      LEDGER_SERVICE_URL: http://ledger-service:3003
      FX_SERVICE_URL: http://fx-service:3004
      PAYROLL_SERVICE_URL: http://payroll-service:3005
      ADMIN_SERVICE_URL: http://admin-service:3006
    depends_on:
      account-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
      fx-service:
        condition: service_healthy
      payroll-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy

  account-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/account/Dockerfile
    ports:
      - "3001:3001"
    environment:
      <<: *common-env
      PORT: 3001
      DATABASE_URL: postgresql://novapay:${POSTGRES_PASSWORD:-novapay_secret}@postgres-account:5432/novapay_account
    depends_on:
      postgres-account:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  transaction-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/transaction/Dockerfile
    ports:
      - "3002:3002"
    environment:
      <<: *common-env
      PORT: 3002
      DATABASE_URL: postgresql://novapay:${POSTGRES_PASSWORD:-novapay_secret}@postgres-transaction:5432/novapay_transaction
      ACCOUNT_SERVICE_URL: http://account-service:3001
      LEDGER_SERVICE_URL: http://ledger-service:3003
      FX_SERVICE_URL: http://fx-service:3004
    depends_on:
      postgres-transaction:
        condition: service_healthy
      redis:
        condition: service_healthy
      account-service:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ledger-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/ledger/Dockerfile
    ports:
      - "3003:3003"
    environment:
      <<: *common-env
      PORT: 3003
      DATABASE_URL: postgresql://novapay:${POSTGRES_PASSWORD:-novapay_secret}@postgres-ledger:5432/novapay_ledger
    depends_on:
      postgres-ledger:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  fx-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/fx/Dockerfile
    ports:
      - "3004:3004"
    environment:
      <<: *common-env
      PORT: 3004
      DATABASE_URL: postgresql://novapay:${POSTGRES_PASSWORD:-novapay_secret}@postgres-fx:5432/novapay_fx
    depends_on:
      postgres-fx:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  payroll-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/payroll/Dockerfile
    ports:
      - "3005:3005"
    environment:
      <<: *common-env
      PORT: 3005
      DATABASE_URL: postgresql://novapay:${POSTGRES_PASSWORD:-novapay_secret}@postgres-payroll:5432/novapay_payroll
      TRANSACTION_SERVICE_URL: http://transaction-service:3002
    depends_on:
      postgres-payroll:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  admin-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/admin/Dockerfile
    ports:
      - "3006:3006"
    environment:
      <<: *common-env
      PORT: 3006
      ACCOUNT_SERVICE_URL: http://account-service:3001
      TRANSACTION_SERVICE_URL: http://transaction-service:3002
      LEDGER_SERVICE_URL: http://ledger-service:3003
      FX_SERVICE_URL: http://fx-service:3004
      PAYROLL_SERVICE_URL: http://payroll-service:3005
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3006/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Observability ---
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - novapay-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - novapay-network
    depends_on:
      - prometheus

volumes:
  pg-account-data:
  pg-transaction-data:
  pg-ledger-data:
  pg-fx-data:
  pg-payroll-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  novapay-network:
    driver: bridge
