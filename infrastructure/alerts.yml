groups:
  - name: novapay-critical
    rules:
      - alert: LedgerInvariantViolation
        expr: ledger_invariant_violations_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL: Ledger invariant violation detected"
          description: "Money was created or destroyed in the system. Immediate investigation required."

      - alert: HighTransactionFailureRate
        expr: rate(transactions_total{status="FAILED"}[5m]) / rate(transactions_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Transaction failure rate exceeds 5%"

      - alert: FxProviderDown
        expr: rate(fx_provider_errors_total[5m]) > 0.5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "FX rate provider is experiencing errors"

      - alert: HighLatencyP99
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency exceeds 5 seconds"

      - alert: StalledPayrollJob
        expr: time() - payroll_job_last_progress_timestamp > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Payroll job has not made progress in 5 minutes"
